services:
  fastapi-app:
    build:
      context: ./fastapi_app
      dockerfile: Dockerfile
    container_name: fastapi-app
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=land_app
      - MYSQL_PASSWORD=AppPassword123!
      - MYSQL_DB=devdb
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=land_app
      - POSTGRES_PASSWORD=AppPassword123!
      - POSTGRES_DB=devdb
      - ORACLE_HOST=oracle
      - ORACLE_PORT=1521
      - ORACLE_USER=land_app
      - ORACLE_PASSWORD=AppPassword123!
      - ORACLE_SERVICE=XE
      - MSSQL_HOST=mssql
      - MSSQL_PORT=1433
      - MSSQL_USER=land_app
      - MSSQL_PASSWORD=AppPassword123!
      - MSSQL_DB=devdb
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=land_app
      - MONGO_PASSWORD=AppPassword123!
      - MONGO_DB=devdb
      - SECRET_KEY=9a7c36a4f91048b3b4d45d8b725c8397a6e191d918c5e3faef625a62bc2b88dc
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    networks:
      - dbnet
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      db-init:
        condition: service_completed_successfully

  db-init:
    build:
      context: ./fastapi_app
      dockerfile: Dockerfile
    container_name: db-init
    volumes:
      - ./sql:/app/sql
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_ADMIN_USER=admin
      - MYSQL_ADMIN_PASSWORD=Admin1234!
      - MYSQL_DB=devdb
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_ADMIN_USER=admin
      - POSTGRES_ADMIN_PASSWORD=Admin1234!
      - POSTGRES_DB=devdb
      - ORACLE_HOST=oracle
      - ORACLE_PORT=1521
      - ORACLE_ADMIN_USER=admin
      - ORACLE_ADMIN_PASSWORD=Admin1234!
      - ORACLE_SERVICE=XE
      - MSSQL_HOST=mssql
      - MSSQL_PORT=1433
      - MSSQL_ADMIN_USER=sa
      - MSSQL_ADMIN_PASSWORD=Admin1234!
      - MSSQL_DB=devdb
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_ADMIN_USER=admin
      - MONGO_ADMIN_PASSWORD=Admin1234!
      - MONGO_DB=devdb
      - MONGO_AUTH_DB=admin
    entrypoint: ["python", "database/db_init.py"]
    networks:
      - dbnet

  superset:
    image: apache/superset:latest
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=9a7c36a4f91048b3b4d45d8b725c8397a6e191d918c5e3faef625a62bc2b88dc
      - MAPBOX_API_KEY=""
    volumes:
      - superset_home:/app/superset_home
    networks:
      - dbnet
    restart: always

networks:
  dbnet:
    external: true

volumes:
  superset_home:
