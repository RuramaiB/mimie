<div class="glass p-6 rounded-2xl border border-gray-800 shadow-2xl relative">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-all">&times;</button>
    
    <div class="mb-4">
        <h3 class="text-base font-bold text-white">Register New surveyed land Stand</h3>
        <p class="text-xs text-gray-400">Pushes records directly into active multi-db tables</p>
    </div>

    <!-- Pushes directly to MySQL stands endpoints using JSON encoding via HTMX -->
    <form hx-post="/mysql/stands/" hx-target="#form-result" hx-ext="json-enc" class="space-y-4 text-xs">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-semibold text-gray-400 mb-1 uppercase tracking-wider">Stand Number</label>
                <input type="text" name="stand_number" placeholder="STD-HAR-010" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-brand-500" required>
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-gray-400 mb-1 uppercase tracking-wider">Location City</label>
                <input type="text" name="location_city" placeholder="Harare" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-brand-500" required>
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-semibold text-gray-400 mb-1 uppercase tracking-wider">Descriptive Address</label>
            <input type="text" name="location" placeholder="Plot 45 Borrowdale West Road" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-brand-500" required>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-semibold text-gray-400 mb-1 uppercase tracking-wider">Size in m²</label>
                <input type="number" step="0.01" name="size_m2" placeholder="2500.00" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-brand-500" required>
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-gray-400 mb-1 uppercase tracking-wider">Primary Activity</label>
                <select name="activity" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-brand-500">
                    <option value="Residential">Residential</option>
                    <option value="Commercial">Commercial</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-semibold text-gray-400 mb-1 uppercase tracking-wider">GPS Boundary Polygon (WKT)</label>
            <input type="text" name="gps_coordinates" value="POLYGON((31.111 -17.722, 31.115 -17.722, 31.115 -17.726, 31.111 -17.726, 31.111 -17.722))" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white font-mono text-[10px] focus:outline-none focus:border-brand-500" required>
        </div>

        <div>
            <label class="block text-[10px] font-semibold text-gray-400 mb-1 uppercase tracking-wider">Stand Picture URL</label>
            <input type="text" name="picture_url" placeholder="http://images.lands.gov.zw/stands/std-010.png" class="w-full bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-brand-500">
        </div>

        <div class="flex items-center justify-between gap-4 mt-6">
            <button type="button" onclick="closeModal()" class="w-1/2 bg-gray-800 hover:bg-gray-700 text-white font-semibold py-2.5 rounded-xl transition-all">
                Cancel
            </button>
            <button type="submit" class="w-1/2 bg-brand-500 hover:bg-brand-600 text-gray-950 font-bold py-2.5 rounded-xl transition-all">
                Register Stand
            </button>
        </div>
    </form>
    <div id="form-result" class="mt-4 text-xs"></div>
</div>
